<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotas Escolas — Sete Lagoas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden}

    /* ── Sidebar ── */
    #sidebar{
      width:340px;min-width:280px;height:100vh;
      background:#1e1e2e;color:#cdd6f4;
      display:flex;flex-direction:column;overflow:hidden;
      box-shadow:2px 0 12px rgba(0,0,0,.4);z-index:1000;
    }

    /* ── Header ── */
    #hdr{background:#313244;padding:14px 16px;border-bottom:1px solid #45475a;flex-shrink:0}
    #hdr h2{font-size:12px;color:#89b4fa;margin-bottom:4px}
    #hdr h1{font-size:16px;color:#cdd6f4;margin-bottom:10px}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .stat{background:#45475a;border-radius:8px;padding:7px 10px;text-align:center}
    .stat-v{font-size:17px;font-weight:bold;color:#a6e3a1}
    .stat-v.kg{color:#fab387}
    .stat-l{font-size:10px;color:#a6adc8;margin-top:2px}

    /* ── Nav bar ── */
    #nav{background:#2a2a3e;padding:8px 12px;border-bottom:1px solid #45475a;flex-shrink:0;display:flex;align-items:center;gap:8px}
    .btn-back{
      background:none;border:1px solid #585b70;color:#cdd6f4;
      padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;
      display:flex;align-items:center;gap:4px;
    }
    .btn-back:hover{background:#313244}
    #nav-title{font-size:12px;color:#a6adc8;flex:1;text-align:center}

    /* ── Legenda ── */
    #legenda{background:#2a2a3e;padding:8px 14px;border-bottom:1px solid #45475a;flex-shrink:0}
    #legenda h3{font-size:10px;color:#89b4fa;margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
    .leg-row{display:flex;gap:12px;flex-wrap:wrap}
    .leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#a6adc8}
    .leg-dot{width:11px;height:11px;border-radius:50%;border:1px solid rgba(255,255,255,.2)}

    /* ── Busca ── */
    #search-box{padding:8px 12px;background:#313244;border-bottom:1px solid #45475a;flex-shrink:0}
    #search-box input{
      width:100%;padding:6px 10px;background:#1e1e2e;color:#cdd6f4;
      border:1px solid #45475a;border-radius:6px;font-size:12px;outline:none;
    }
    #search-box input:focus{border-color:#89b4fa}

    /* ── Lista ── */
    #lista{overflow-y:auto;flex:1;padding:5px 0}
    .item{
      display:flex;align-items:flex-start;gap:9px;
      padding:7px 14px;cursor:pointer;
      border-left:3px solid transparent;transition:background .15s;
    }
    .item:hover{background:#313244;border-left-color:#89b4fa}
    .item.ativo{background:#313244;border-left-color:#a6e3a1}
    .badge{
      min-width:24px;height:24px;border-radius:50%;
      font-size:10px;font-weight:bold;color:#1e1e2e;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
    }
    .item-nome{font-size:12px;color:#cdd6f4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub{font-size:10px;color:#6c7086;margin-top:1px}
    .item-kg{font-size:10px;font-weight:600;margin-top:1px}

    /* ── Botão principal ── */
    #btn-rotas-wrap{padding:12px;flex-shrink:0;background:#1e1e2e;border-top:1px solid #45475a}
    #btn-rotas{
      width:100%;padding:10px;border:none;border-radius:8px;
      background:#89b4fa;color:#1e1e2e;font-size:13px;font-weight:bold;
      cursor:pointer;transition:background .2s;
    }
    #btn-rotas:hover{background:#74c7ec}

    /* ── Cards de rota ── */
    #cards-wrap{overflow-y:auto;flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:10px}
    .card-rota{
      border-radius:10px;padding:14px;cursor:pointer;
      border:2px solid transparent;transition:border-color .2s, transform .15s;
    }
    .card-rota:hover{transform:translateX(3px)}
    .card-rota.selecionada{border-color:rgba(255,255,255,.5)}
    .card-nome{font-size:15px;font-weight:bold;color:#fff;margin-bottom:8px}
    .card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .card-stat{background:rgba(0,0,0,.2);border-radius:6px;padding:6px 8px;text-align:center}
    .card-stat-v{font-size:15px;font-weight:bold;color:#fff}
    .card-stat-l{font-size:10px;color:rgba(255,255,255,.7);margin-top:1px}

    /* ── Info rota detalhe ── */
    #rota-info{padding:12px 14px;background:#2a2a3e;border-bottom:1px solid #45475a;flex-shrink:0}
    .rota-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
    .rota-stat{background:#45475a;border-radius:6px;padding:6px;text-align:center}
    .rota-stat-v{font-size:14px;font-weight:bold}
    .rota-stat-l{font-size:10px;color:#a6adc8;margin-top:1px}

    /* ── Mapa ── */
    #map{flex:1;height:100vh}

    /* ── Popup ── */
    .pu-t{font-weight:bold;font-size:12px;margin-bottom:4px;line-height:1.3;color:#1e1e2e}
    .pu-badge{
      display:inline-flex;align-items:center;justify-content:center;
      width:18px;height:18px;border-radius:50%;
      font-size:9px;font-weight:bold;color:#1e1e2e;margin-right:5px;vertical-align:middle;
    }
    .pu-i{font-size:11px;color:#444;line-height:1.7}
    .pu-kg{font-size:12px;font-weight:bold;margin-bottom:3px}

    /* visibilidade controlada por JS */
    .hidden{display:none!important}
  </style>
</head>

, [-19.468129, -44.256566], [-19.46827, -44.256248], [-19.468328, -44.256048], [-19.468362, -44.25604], [-19.468422, -44.255995], [-19.468452, -44.255923], [-19.468435, -44.255874], [-19.468434, -44.255747], [-19.468459, -44.255578], [-19.468589, -44.255172], [-19.46862, -44.254976], [-19.46859, -44.25467], [-19.46854, -44.254367], [-19.46848, -44.25409], [-19.468476, -44.253779], [-19.468596, -44.252473], [-19.468567, -44.252277], [-19.468514, -44.252101], [-19.468319, -44.251702], [-19.46766, -44.250775], [-19.467602, -44.250613], [-19.467565, -44.250419], [-19.467556, -44.249999], [-19.467511, -44.249426], [-19.467537, -44.249163], [-19.4676, -44.248968], [-19.468159, -44.247233], [-19.468183, -44.246997], [-19.468173, -44.246855], [-19.468031, -44.246417], [-19.468185, -44.246378], [-19.468894, -44.246208], [-19.469481, -44.246033], [-19.470097, -44.24588], [-19.47114, -44.245747], [-19.471651, -44.245674], [-19.472307, -44.245637], [-19.472833, -44.245664], [-19.473048, -44.24568], [-19.473586, -44.2457], [-19.474185, -44.245719], [-19.475221, -44.245735], [-19.47529, -44.245726], [-19.47546, -44.245694], [-19.475625, -44.245637], [-19.47572, -44.24558], [-19.475842, -44.245492], [-19.475959, -44.245386], [-19.476078, -44.245256], [-19.476185, -44.245122], [-19.476647, -44.244398], [-19.476729, -44.244247], [-19.477051, -44.243802], [-19.477455, -44.24339], [-19.477589, -44.243289], [-19.477777, -44.243196], [-19.478036, -44.243175], [-19.478743, -44.243145], [-19.478991, -44.243132], [-19.479645, -44.243054], [-19.479799, -44.242976], [-19.480333, -44.242557], [-19.48035, -44.241812], [-19.480364, -44.241663], [-19.48054, -44.241046], [-19.480588, -44.240842], [-19.480705, -44.240382]]}];
const DEPOSITO = {"nome": "EM STELLA DE FIGUEIREDO C DRUMOND", "lat": -19.4807054, "lon": -44.2403821};
const ALL_PONTOS = ROTAS.flatMap(r => r.pontos);

// ── Mapa ─────────────────────────────────────────────────────────────────────
const map = L.map('map').setView([-19.44249,-44.23649], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; OpenStreetMap contributors', maxZoom:19
}).addTo(map);

// ── Estado ───────────────────────────────────────────────────────────────────
let viewAtual = 0;   // 0=geral 1=seleção 2=detalhe rota
let rotaAtiva = null;

// ── Layers ───────────────────────────────────────────────────────────────────
const polylines   = {};   // rota_id → L.polyline
const marcadores  = {};   // "v-ordem" → {marker, data}
const marcGroup   = L.layerGroup().addTo(map);

// Depósito (estrela)
const iconeDeposito = L.divIcon({
  className:'',
  html:`<div style="background:#f38ba8;color:#1e1e2e;border-radius:4px;
    width:28px;height:28px;display:flex;align-items:center;justify-content:center;
    font-size:14px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.5)">&#9733;</div>`,
  iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]
});
L.marker([DEPOSITO.lat, DEPOSITO.lon], {icon:iconeDeposito})
  .bindPopup(`<b>&#128336; Almoxarifado / Depósito</b><br><small>${DEPOSITO.nome}</small>`)
  .addTo(map);

// Cria polylines (inicialmente ocultos)
ROTAS.forEach(r => {
  const pl = L.polyline(r.linha, {color:r.cor, weight:4, opacity:0.85});
  polylines[r.id] = pl;
});

// ── Ícone numerado ────────────────────────────────────────────────────────────
function corKg(kg) {
  if (!kg||kg===0) return '#abb2bf';
  if (kg>=350) return '#e06c75';
  if (kg>=150) return '#e5c07b';
  return '#98c379';
}
function icone(n, cor) {
  return L.divIcon({
    className:'',
    html:`<div style="background:${cor};color:#1e1e2e;border-radius:50%;
      width:24px;height:24px;display:flex;align-items:center;justify-content:center;
      font-size:9px;font-weight:bold;border:2px solid #fff;
      box-shadow:0 2px 5px rgba(0,0,0,.45)">${n}</div>`,
    iconSize:[24,24],iconAnchor:[12,12],popupAnchor:[0,-14]
  });
}
function iconeBig(n, cor, corBorda) {
  return L.divIcon({
    className:'',
    html:`<div style="background:${cor};color:#1e1e2e;border-radius:50%;
      width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      font-size:10px;font-weight:bold;border:3px solid ${corBorda};
      box-shadow:0 2px 6px rgba(0,0,0,.55)">${n}</div>`,
    iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]
  });
}

// ── Popup ─────────────────────────────────────────────────────────────────────
function popupHtml(p) {
  const corB = ROTAS[p.rota-1].cor;
  const hAc=Math.floor(p.tempo_acum/60), mAc=Math.round(p.tempo_acum%60);
  const tAcStr=hAc>0?`${hAc}h${String(mAc).padStart(2,'0')}min`:`${mAc} min`;
  let grauLabel='Sem dados', grauCor='#888';
  if (p.kg>=350){grauLabel='Carga pesada';grauCor='#c0392b';}
  else if (p.kg>=150){grauLabel='Carga média';grauCor='#d4810a';}
  else if (p.kg>0){grauLabel='Carga leve';grauCor='#27ae60';}
  const kgStr=p.kg>0?`${p.kg.toFixed(0)} kg/sem`:'sem dados';
  return `
    <div class="pu-t"><span class="pu-badge" style="background:${corB}">${p.ordem}</span>${p.nome}</div>
    <div class="pu-kg" style="color:${grauCor}">&#9646; ${grauLabel} &mdash; ${kgStr}</div>
    <hr style="border:none;border-top:1px solid #ddd;margin:4px 0">
    <div class="pu-i">
      Trecho: <b>${p.dist_leg.toFixed(1)} km</b> / ${p.tempo_leg.toFixed(0)} min<br>
      Acumulado: <b>${p.dist_acum.toFixed(1)} km</b> / ${tAcStr}
    </div>`;
}

// Cria todos os marcadores
function criarMarcadores() {
  marcGroup.clearLayers();
  ALL_PONTOS.forEach(p => {
    const ckg=corKg(p.kg);
    const corRota=ROTAS[p.rota-1].cor;
    // na view geral usa cor por kg; na view rota usa cor da rota
    const corUsar = (viewAtual===2 && rotaAtiva===p.rota) ? corRota : ckg;
    const m = L.marker([p.lat,p.lon], {icon: viewAtual===2 ? iconeBig(p.ordem,corUsar,corRota) : icone(p.ordem,corUsar)});
    m.bindPopup(popupHtml(p), {maxWidth:280});
    marcadores[`${p.rota}-${p.ordem}`] = {marker:m, data:p};
    if (viewAtual===0 || (viewAtual===2 && rotaAtiva===p.rota)) {
      marcGroup.addLayer(m);
    }
  });
}

// ── VIEW 0 — Geral ────────────────────────────────────────────────────────────
function irParaGeral() {
  viewAtual=0; rotaAtiva=null;
  // Polylines: oculta todos
  Object.values(polylines).forEach(pl => {if (map.hasLayer(pl)) map.removeLayer(pl);});
  // UI
  document.getElementById('nav').classList.add('hidden');
  document.getElementById('legenda').classList.remove('hidden');
  document.getElementById('rota-info').classList.add('hidden');
  document.getElementById('search-box').classList.remove('hidden');
  document.getElementById('lista').classList.remove('hidden');
  document.getElementById('cards-wrap').classList.add('hidden');
  document.getElementById('btn-rotas-wrap').classList.remove('hidden');
  document.getElementById('busca').value='';
  criarMarcadores();
  renderLista(ALL_PONTOS, '');
  map.fitBounds(marcGroup.getBounds(), {padding:[20,20]});
}

// ── VIEW 1 — Seleção de rota ─────────────────────────────────────────────────
function irParaRotas() {
  viewAtual=1; rotaAtiva=null;
  // Polylines: mostra todos
  ROTAS.forEach(r => map.addLayer(polylines[r.id]));
  // UI
  document.getElementById('nav').classList.remove('hidden');
  document.getElementById('nav-title').textContent='Selecione uma rota';
  document.getElementById('legenda').classList.add('hidden');
  document.getElementById('rota-info').classList.add('hidden');
  document.getElementById('search-box').classList.add('hidden');
  document.getElementById('lista').classList.add('hidden');
  document.getElementById('cards-wrap').classList.remove('hidden');
  document.getElementById('btn-rotas-wrap').classList.add('hidden');
  criarMarcadores();
  renderCards();
  const bounds = L.latLngBounds(ALL_PONTOS.map(p=>[p.lat,p.lon]));
  map.fitBounds(bounds, {padding:[20,20]});
}

// ── VIEW 2 — Detalhe rota ─────────────────────────────────────────────────────
function irParaRota(rid) {
  viewAtual=2; rotaAtiva=rid;
  const r=ROTAS[rid-1];
  // Polylines: só a ativa
  ROTAS.forEach(rx => {
    if (rx.id===rid) map.addLayer(polylines[rx.id]);
    else if (map.hasLayer(polylines[rx.id])) map.removeLayer(polylines[rx.id]);
  });
  // UI
  document.getElementById('nav').classList.remove('hidden');
  document.getElementById('nav-title').textContent=r.nome;
  document.getElementById('legenda').classList.remove('hidden');
  document.getElementById('rota-info').classList.remove('hidden');
  document.getElementById('search-box').classList.remove('hidden');
  document.getElementById('lista').classList.remove('hidden');
  document.getElementById('cards-wrap').classList.add('hidden');
  document.getElementById('btn-rotas-wrap').classList.add('hidden');
  document.getElementById('busca').value='';
  // Stats da rota
  document.getElementById('rota-stats').innerHTML=`
    <div class="rota-stat"><div class="rota-stat-v" style="color:${r.cor}">${r.n_escolas}</div><div class="rota-stat-l">Escolas</div></div>
    <div class="rota-stat"><div class="rota-stat-v" style="color:#a6e3a1">${r.dist_km} km</div><div class="rota-stat-l">Distância</div></div>
    <div class="rota-stat"><div class="rota-stat-v" style="color:#89dceb">${r.tempo_viagem}</div><div class="rota-stat-l">Deslocamento</div></div>
    <div class="rota-stat"><div class="rota-stat-v" style="color:#f9e2af">${r.tempo_paradas}</div><div class="rota-stat-l">Paradas (${r.min_parada} min)</div></div>
    <div class="rota-stat" style="grid-column:1/-1"><div class="rota-stat-v" style="color:#fab387;font-size:16px">&#9200; ${r.tempo_total}</div><div class="rota-stat-l">Tempo total estimado</div></div>
    <div class="rota-stat" style="grid-column:1/-1"><div class="rota-stat-v" style="color:#cba6f7">${r.kg_total.toLocaleString('pt-BR')} kg/sem</div><div class="rota-stat-l">Carga semanal</div></div>`;
  criarMarcadores();
  renderLista(r.pontos, '');
  const bounds = L.latLngBounds(r.pontos.map(p=>[p.lat,p.lon]));
  map.fitBounds(bounds, {padding:[30,30]});
}

// ── Voltar ────────────────────────────────────────────────────────────────────
function voltarView() {
  if (viewAtual===2) irParaRotas();
  else irParaGeral();
}

// ── Render lista ──────────────────────────────────────────────────────────────
function grauLabel(kg,cor) {
  if (!kg||kg===0) return '<span style="color:#888">sem dados</span>';
  if (kg>=350) return `<span style="color:${cor||'#e06c75'}">Pesada</span>`;
  if (kg>=150) return `<span style="color:${cor||'#e5c07b'}">Média</span>`;
  return `<span style="color:${cor||'#98c379'}">Leve</span>`;
}

function renderLista(pontos, filtro) {
  const lista=document.getElementById('lista');
  lista.innerHTML='';
  const corBadge = viewAtual===2 ? ROTAS[rotaAtiva-1].cor : null;
  pontos.filter(p=>!filtro||p.nome.toLowerCase().includes(filtro.toLowerCase()))
    .forEach(p=>{
      const div=document.createElement('div');
      div.className='item';
      div.id=`item-${p.rota}-${p.ordem}`;
      const badge_cor = corBadge || corKg(p.kg);
      const kgDisp = p.kg>0?`${p.kg.toFixed(0)} kg/sem &mdash; ${grauLabel(p.kg)}`
                           : grauLabel(0);
      div.innerHTML=`
        <div class="badge" style="background:${badge_cor}">${p.ordem}</div>
        <div style="flex:1;min-width:0">
          <div class="item-nome">${p.nome}</div>
          <div class="item-sub">${p.dist_leg.toFixed(1)} km &middot; ${p.tempo_leg.toFixed(0)} min do anterior</div>
          <div class="item-kg">${kgDisp}</div>
        </div>`;
      div.onclick=()=>{
        map.setView([p.lat,p.lon],16);
        const key=`${p.rota}-${p.ordem}`;
        if(marcadores[key]) marcadores[key].marker.openPopup();
        document.querySelectorAll('.item').forEach(el=>el.classList.remove('ativo'));
        div.classList.add('ativo');
      };
      lista.appendChild(div);
    });
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards() {
  const wrap=document.getElementById('cards-wrap');
  wrap.innerHTML='';
  ROTAS.forEach(r=>{
    const card=document.createElement('div');
    card.className='card-rota';
    card.style.background=r.cor+'33';
    card.style.borderColor=r.cor+'66';
    card.innerHTML=`
      <div class="card-nome" style="color:${r.cor}">${r.nome}</div>
      <div class="card-stats">
        <div class="card-stat"><div class="card-stat-v">${r.n_escolas}</div><div class="card-stat-l">Escolas</div></div>
        <div class="card-stat"><div class="card-stat-v">${r.dist_km} km</div><div class="card-stat-l">Distância</div></div>
        <div class="card-stat"><div class="card-stat-v">${r.tempo_viagem}</div><div class="card-stat-l">Deslocamento</div></div>
        <div class="card-stat"><div class="card-stat-v">${r.tempo_paradas}</div><div class="card-stat-l">Paradas (${r.min_parada} min/escola)</div></div>
        <div class="card-stat" style="grid-column:1/-1;background:rgba(0,0,0,.35)">
          <div class="card-stat-v" style="font-size:18px">${r.tempo_total}</div>
          <div class="card-stat-l">&#9200; Tempo total estimado</div>
        </div>
        <div class="card-stat" style="grid-column:1/-1"><div class="card-stat-v">${r.kg_total.toLocaleString('pt-BR')} kg</div><div class="card-stat-l">Carga/semana</div></div>
      </div>`;
    card.onclick=()=>irParaRota(r.id);
    wrap.appendChild(card);
  });
}

function filtrarLista() {
  const filtro=document.getElementById('busca').value;
  const pontos = viewAtual===2 ? ROTAS[rotaAtiva-1].pontos : ALL_PONTOS;
  renderLista(pontos, filtro);
}

// ── Init ─────────────────────────────────────────────────────────────────────
irParaGeral();
</script>
</body>
</html>
